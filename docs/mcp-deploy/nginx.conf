# ============================================================
# MCP Server nginx 站点配置（模板）
# install.sh 会替换 __占位符__ 后安装到 /etc/nginx/conf.d/
#
# 职责：HTTPS 终止 + Token 鉴权 + SSE 反代
# MCP server 只监听 127.0.0.1:8765，公网必须经此 nginx 才能访问
# ============================================================

# Token 校验：把合法 token 映射为 "ok"，其余都是空字符串
# __MCP_TOKEN__ 会被 install.sh 替换成 .env 里的 MCP_TOKEN
map $arg_token $token_valid {
    default "";
    "__MCP_TOKEN__" "ok";
}

# HTTP → HTTPS 强制跳转
server {
    listen 80;
    server_name __MCP_DOMAIN__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name __MCP_DOMAIN__;

    # ---- HTTPS 证书（Let's Encrypt，certbot --nginx 会自动填好路径）----
    ssl_certificate     /etc/letsencrypt/live/__MCP_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__MCP_DOMAIN__/privkey.pem;

    # TLS 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全响应头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # ---- MCP SSE 端点 ----
    location /mcp {
        # Token 校验：URL 没带 ?token=xxx 或 token 不匹配 → 403
        if ($token_valid = "") {
            return 403 '{"error":"invalid or missing token"}';
        }

        # 反向代理到本地 MCP server
        proxy_pass http://127.0.0.1:__MCP_PORT__;
        proxy_http_version 1.1;

        # SSE 必需：禁用缓冲，让流式事件实时推给客户端
        proxy_buffering off;
        proxy_cache off;

        # SSE 必需：保持长连接，不主动断开
        proxy_set_header Connection "";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 透传客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 根路径给个简单的健康提示（不暴露任何敏感信息）
    location = / {
        return 200 'AI Chat Knowledge MCP Server\n';
        add_header Content-Type text/plain;
    }
}
