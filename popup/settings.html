<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Collector - 设置</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>设置</h1>
      <button class="back-btn" id="backBtn">返回</button>
    </header>

    <!-- Embedding 设置 -->
    <section class="setting-section">
      <h2>Embedding 服务</h2>
      <p class="desc">用于将对话内容转换为向量，支持语义搜索</p>

      <div class="form-group">
        <label>Embedding 模型</label>
        <select id="embeddingModel">
          <option value="text-embedding-v4">text-embedding-v4（纯文本，推荐）</option>
          <option value="tongyi-embedding-vision-plus-2026-03-06">tongyi-embedding-vision-plus（多模态）</option>
        </select>
        <small>纯文本对话推荐 v4；如需图片/视频检索选多模态</small>
      </div>

      <div class="form-group">
        <label>DashScope API Key</label>
        <input type="password" id="dashscopeEmbeddingKey" placeholder="sk-..." />
        <small>在 <a href="https://dashscope.console.aliyun.com/" target="_blank">阿里云百炼控制台</a> 获取</small>
      </div>
    </section>

    <!-- 向量库设置 -->
    <section class="setting-section">
      <h2>向量库</h2>
      <p class="desc">存储和检索向量数据</p>

      <div class="form-group">
        <label>向量库类型</label>
        <select id="vectorStoreType">
          <option value="local">内置（IndexedDB，零配置）</option>
          <option value="chroma">ChromaDB（本地）</option>
          <option value="milvus">Milvus（本地/云端）</option>
          <option value="pgvector">PostgreSQL + pgvector</option>
          <option value="pinecone">Pinecone（云端）</option>
          <option value="supabase">Supabase（云端）</option>
          <option value="qdrant">Qdrant（云端）</option>
        </select>
      </div>

      <div id="remoteVectorConfig" style="display:none">
        <div class="form-group">
          <label>服务地址</label>
          <input type="text" id="vectorUrl" placeholder="http://localhost:8000" />
        </div>
        <div class="form-group">
          <label>API Key（可选）</label>
          <input type="password" id="vectorApiKey" placeholder="留空则不使用认证" />
        </div>
        <div class="form-group">
          <label>集合/表名</label>
          <input type="text" id="vectorCollection" placeholder="ai_chat_vectors" />
        </div>
      </div>
    </section>

    <!-- LLM 设置 -->
    <section class="setting-section">
      <h2>LLM 大模型</h2>
      <p class="desc">用于 AI 问答、整理信息和生成测验</p>

      <div class="form-group">
        <label>LLM 后端</label>
        <select id="llmBackend">
          <option value="dashscope">Qwen/DashScope（阿里云百炼）</option>
          <option value="openai">OpenAI 兼容 API</option>
          <option value="ollama">Ollama 本地</option>
        </select>
      </div>

      <!-- DashScope -->
      <div id="dashscopeLlmConfig">
        <div class="form-group">
          <label>DashScope API Key</label>
          <input type="password" id="dashscopeLlmKey" placeholder="sk-..." />
          <small>在 <a href="https://dashscope.console.aliyun.com/" target="_blank">阿里云百炼控制台</a> 获取</small>
        </div>
        <div class="form-group">
          <label>模型</label>
          <select id="dashscopeModel">
            <option value="deepseek-v4-flash">Deepseek-v4-Flash</option>
            <option value="qwen3.6-flash-2026-04-16">Qwen3.6-Flash-2026-04-16</option>
            <option value="deepseek-v4-pro">Deepseek-v4-Pro</option>
          </select>
        </div>
      </div>

      <!-- OpenAI 兼容 -->
      <div id="openaiLlmConfig" style="display:none">
        <div class="form-group">
          <label>API Base URL</label>
          <input type="text" id="openaiBaseUrl" placeholder="https://api.openai.com" />
        </div>
        <div class="form-group">
          <label>API Key</label>
          <input type="password" id="openaiApiKey" placeholder="sk-..." />
        </div>
        <div class="form-group">
          <label>模型名称</label>
          <input type="text" id="openaiModel" placeholder="gpt-3.5-turbo" />
        </div>
      </div>

      <!-- Ollama -->
      <div id="ollamaLlmConfig" style="display:none">
        <div class="form-group">
          <label>Ollama 地址</label>
          <input type="text" id="ollamaBaseUrl" placeholder="http://localhost:11434" />
        </div>
        <div class="form-group">
          <label>模型名称</label>
          <input type="text" id="ollamaModel" placeholder="qwen2.5:7b" />
        </div>
      </div>
    </section>

    <!-- 操作按钮 -->
    <section class="setting-section actions">
      <button class="btn btn-primary" id="saveBtn">保存设置</button>
      <button class="btn" id="testEmbeddingBtn">测试 Embedding</button>
      <button class="btn" id="testLlmBtn">测试 LLM</button>
      <button class="btn btn-danger" id="rebuildIndexBtn">重建向量索引</button>
    </section>

    <!-- 数据管理 -->
    <section class="setting-section danger-zone">
      <h2>数据管理</h2>
      <p class="desc">清理本地存储数据，操作不可撤销</p>

      <div class="form-group">
        <button class="btn btn-danger" id="clearEmbeddingsBtn">清空向量索引</button>
        <small>删除所有 embedding 向量数据，对话记录不受影响</small>
      </div>
      <div class="form-group">
        <button class="btn btn-danger" id="clearConversationsBtn">清空所有对话</button>
        <small>删除所有对话记录及关联的向量索引</small>
      </div>
      <div class="form-group">
        <button class="btn btn-danger" id="resetSettingsBtn">重置全部设置</button>
        <small>恢复所有配置为默认值</small>
      </div>
    </section>

    <!-- 状态提示 -->
    <div class="toast" id="toast"></div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
